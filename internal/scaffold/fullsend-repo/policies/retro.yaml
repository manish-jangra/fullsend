---
version: 1

# Sandbox policy for the retro agent.
#
# Read-only agent: needs GitHub API (gh run list, gh run view, gh pr view)
# and Vertex AI for inference. The sandbox token has issues:write (needed by
# the post-script on the runner) and pull_requests:write (required by GitHub to
# comment on PRs via the issues endpoint) but not contents:write.
# curl intentionally excluded to prevent disallowedTools bypass via raw HTTP
# with the injected GH_TOKEN.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "api.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  github_api:
    name: github-api
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/gh"
      - path: "**/node"

  github_artifacts:
    name: github-artifacts
    endpoints:
      - host: "*.blob.core.windows.net"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "*.actions.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/gh"
