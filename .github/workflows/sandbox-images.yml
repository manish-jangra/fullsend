name: Sandbox Images

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+*"
    branches:
      - main
    paths:
      - "images/sandbox/**"
      - "images/code/**"
  pull_request:
    paths:
      - "images/sandbox/**"
      - "images/code/**"
  workflow_dispatch:

# NOTE: GitHub Actions ignores `paths` filters on tag pushes, so every
# semver tag triggers a build.  This is intentional — the sandbox image
# is published alongside the CLI so consumers can pin both to the same
# version.  Branch pushes and PRs still respect the paths filter.

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.ref.outputs.value }}
    env:
      BASE_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fullsend-sandbox
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.event_name != 'pull_request' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: images/sandbox
          file: images/sandbox/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      # Compute a single image reference for the build-code job.
      # On push/dispatch: use the immutable digest from the pushed manifest list.
      # On PR: use the :dev tag (multi-arch, published by workflow_dispatch)
      # so that both platform legs can resolve a base image.
      - name: Compute base image ref
        id: ref
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_NAME: ${{ env.BASE_IMAGE_NAME }}
        run: |
          if [ -n "$DIGEST" ]; then
            echo "value=${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${IMAGE_NAME}:dev" >> "$GITHUB_OUTPUT"
          fi

  build-code:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CODE_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fullsend-code
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.CODE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.event_name != 'pull_request' }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: images/code
          file: images/code/Containerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ needs.build-base.outputs.image-ref }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=code
          cache-to: type=gha,mode=max,scope=code
