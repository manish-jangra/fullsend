# Reusable code agent workflow. Called by thin callers in .fullsend repos
# via workflow_call. Runs in the caller's repo context (secrets, checkout).
name: Code Agent

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string
      mint_url:
        required: true
        type: string
      gcp_region:
        required: true
        type: string
      fullsend_version:
        required: false
        type: string
        default: 'latest'
      install_mode:
        required: false
        type: string
        default: 'per-org'
    secrets:
      FULLSEND_GCP_WIF_PROVIDER:
        required: true
      FULLSEND_GCP_PROJECT_ID:
        required: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@v6

      - name: Checkout upstream defaults
        uses: actions/checkout@v6
        with:
          repository: fullsend-ai/fullsend
          ref: v0
          path: .defaults
          sparse-checkout: |
            internal/scaffold/fullsend-repo/

      - name: Prepare workspace (upstream defaults + org/repo overrides)
        env:
          INSTALL_MODE: ${{ inputs.install_mode }}
        run: |
          set -euo pipefail
          if [[ "${INSTALL_MODE}" != "per-org" && "${INSTALL_MODE}" != "per-repo" ]]; then
            echo "::error::Invalid install_mode '${INSTALL_MODE}': must be 'per-org' or 'per-repo'"
            exit 1
          fi
          SRC=".defaults/internal/scaffold/fullsend-repo"
          LAYERED_DIRS="agents skills schemas harness policies scripts env"
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${SRC}/${dir}" ]]; then
              mkdir -p "${dir}"
              cp -r "${SRC}/${dir}/." "${dir}/"
            fi
          done
          CUSTOM_BASE="customized"
          if [[ "${INSTALL_MODE}" == "per-repo" ]]; then
            CUSTOM_BASE=".fullsend/customized"
          fi
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${CUSTOM_BASE}/${dir}" ]]; then
              find "${CUSTOM_BASE}/${dir}" -type f ! -name '.gitkeep' -print0 \
                | while IFS= read -r -d '' f; do
                    rel="${f#"${CUSTOM_BASE}"/}"
                    mkdir -p "$(dirname "${rel}")"
                    cp "${f}" "${rel}"
                  done
            fi
          done
          mkdir -p .github/scripts
          cp "${SRC}/.github/scripts/setup-agent-env.sh" .github/scripts/setup-agent-env.sh
          rm -rf .defaults

      - name: Validate enrollment and extract repo metadata
        id: repo-parts
        uses: fullsend-ai/fullsend/.github/actions/validate-enrollment@v0
        with:
          source_repo: ${{ inputs.source_repo }}
          install_mode: ${{ inputs.install_mode }}

      - name: Mint coder token
        id: app-token
        uses: fullsend-ai/fullsend/.github/actions/mint-token@v0
        with:
          role: coder
          repos: ${{ steps.repo-parts.outputs.name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        run: bash scripts/pre-code.sh

      - name: Setup GCP and prepare credentials
        uses: fullsend-ai/fullsend/.github/actions/setup-gcp@v0
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          CODE_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent
        uses: fullsend-ai/fullsend@v0
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUSH_TOKEN_SOURCE: github-app
          TARGET_BRANCH: main
        with:
          agent: code
          version: ${{ inputs.fullsend_version }}
